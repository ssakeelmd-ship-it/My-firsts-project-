<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संजीत ट्रेवल सर्विसेज - ऑनलाइन बुकिंग</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Devanagari', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hero-gradient { background: linear-gradient(135deg, #ea580c 0%, #9a3412 100%); }
        .service-card { transition: all 0.2s ease; }
        .service-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-28">

    <!-- Global Navigation -->
    <script>
        const googleFormLink = "https://docs.google.com/forms/d/e/1FAIpQLSfA8Wf9P0EpoAg3QEEq5wsnl4WwMS5yrq_bXle6h_DyqFrPaA/viewform?usp=publish-editor";
        const whatsappLink = "https://wa.me/qr/QXFSA5JWUMRMK1";
        const phoneNumber = "6200771618";

        function openBookingForm() {
            window.open(googleFormLink, '_blank');
        }

        function openWhatsApp() {
            window.open(whatsappLink, '_blank');
        }

        function makeCall() {
            window.location.href = `tel:${phoneNumber}`;
        }
    </script>

    <!-- Header -->
    <nav class="sticky top-0 z-50 bg-orange-600 text-white p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-white text-orange-600 p-1.5 rounded-xl shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
            </div>
            <div>
                <h1 class="font-black text-lg leading-none tracking-tight">संजीत ट्रेवल</h1>
                <p class="text-[9px] uppercase opacity-90 font-bold tracking-widest">Premium Travel Services</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="openWhatsApp()" class="bg-white/20 p-2 rounded-full">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-2.32 0-4.519.903-6.16 2.544-1.64 1.64-2.544 3.839-2.544 6.16 0 2.193.816 4.298 2.296 5.92l-.183.67-.624 2.29 2.344-.614.654-.172c1.554.992 3.36 1.516 5.217 1.516 2.321 0 4.519-.903 6.16-2.544 1.64-1.64 2.544-3.839 2.544-6.16s-.903-4.519-2.544-6.16c-1.64-1.64-3.839-2.544-6.16-2.544z"/></svg>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-md mx-auto">
        <!-- Hero Section -->
        <section class="hero-gradient text-white px-6 pt-10 pb-16 rounded-b-[3rem] shadow-2xl relative">
            <h2 class="text-4xl font-black mb-3 leading-tight">हर सफर बने <br>आसान और सुखद!</h2>
            <p class="text-orange-100 font-medium mb-8">शादी, पार्टी या टूर के लिए अभी गाड़ी बुक करें।</p>
            <div class="flex flex-col gap-3">
                <button onclick="openBookingForm()" class="w-full bg-white text-orange-700 font-black px-8 py-5 rounded-2xl shadow-lg active:scale-95 transition text-lg flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    अभी बुकिंग करें (Google Form)
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="makeCall()" class="bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        कॉल करें
                    </button>
                    <button onclick="openWhatsApp()" class="bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2">
                        WhatsApp
                    </button>
                </div>
            </div>
        </section>

        <!-- Vehicle Info -->
        <div class="px-6 -mt-8 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-orange-50 flex items-center gap-5">
                <div class="bg-orange-100 p-4 rounded-3xl text-orange-600">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
                </div>
                <div>
                    <h3 class="font-black text-xl text-slate-800">सुजुकी ईको (A/C)</h3>
                    <p class="text-orange-600 font-bold text-sm tracking-widest uppercase">HR51BH5018</p>
                </div>
            </div>

            <!-- Highlights -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center service-card">
                    <span class="text-3xl block mb-2">🎁</span>
                    <p class="font-black text-xs text-slate-500 uppercase tracking-widest">शादी के लिए</p>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center service-card">
                    <span class="text-3xl block mb-2">🎈</span>
                    <p class="font-black text-xs text-slate-500 uppercase tracking-widest">पार्टी के लिए</p>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center service-card">
                    <span class="text-3xl block mb-2">🏔️</span>
                    <p class="font-black text-xs text-slate-500 uppercase tracking-widest">घूमने के लिए</p>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center service-card">
                    <span class="text-3xl block mb-2">⚡</span>
                    <p class="font-black text-xs text-slate-500 uppercase tracking-widest">24/7 सर्विस</p>
                </div>
            </div>

            <!-- WhatsApp Link Promotion -->
            <div onclick="openWhatsApp()" class="cursor-pointer bg-green-50 p-6 rounded-[2rem] border-2 border-dashed border-green-200 text-center hover:bg-green-100 transition">
                <p class="text-green-800 font-black mb-2">किसी भी पूछताछ के लिए</p>
                <p class="text-green-600 text-sm font-bold">संजीत भाई को सीधे संदेश भेजें</p>
                <div class="mt-4 inline-flex items-center gap-2 bg-green-600 text-white px-6 py-2 rounded-full font-bold shadow-md">
                    <span>Chat on WhatsApp</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Contact Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center p-4 pb-8 z-40">
        <button onclick="makeCall()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-orange-600">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span class="text-[10px] font-black uppercase">कॉल</span>
        </button>
        <button onclick="openBookingForm()" class="bg-orange-600 text-white px-8 py-3 rounded-full shadow-2xl font-black text-sm active:scale-95 transition -mt-10 border-4 border-white">
            अभी बुक करें
        </button>
        <button onclick="openWhatsApp()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-green-600">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-12.7c.88 0 1.74.13 2.55.36L21 3l-2.04 6.04A8.34 8.34 0 0 1 21 11.5Z"/></svg>
            <span class="text-[10px] font-black uppercase">संदेश</span>
        </button>
    </div>

</body>
</html>
